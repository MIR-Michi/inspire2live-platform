name: Sprint 19 lint diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture lint output
        run: |
          set +e
          pnpm lint > lint-output.txt 2>&1
          code=$?
          echo "$code" > lint-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: sprint19-lint-output
          path: |
            lint-output.txt
            lint-exit-code.txt
