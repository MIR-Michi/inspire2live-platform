name: Deploy to Vercel (Production)

# ──────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • push to main → apply remote database migrations AND deploy the app to
#     Vercel production via the CLI. This is the single, authoritative path that
#     ships every merge to main (migrations first, then deploy).
#   • workflow_dispatch → same thing on demand (force a redeploy, or deploy
#     without a code change).
#
# `supabase db push --include-all` is idempotent (only new migrations are
# applied), so it is safe to run on every push even when nothing changed.
#
# Trade-off: a broken migration on main will mark the main commit red. That is
# the intended signal — production is out of sync until it's fixed — and PR-time
# validation (db-migrations.yml) exists to catch most breakage first.
#
# Required GitHub Secrets  (Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN     – https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD      – Supabase project → Settings → Database → Database password
#   VERCEL_TOKEN              – https://vercel.com/account/tokens
#   VERCEL_ORG_ID             – vercel.com → project → Settings → General
#   VERCEL_PROJECT_ID         – same page
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

# Never let two production deploys run concurrently; let an in-flight deploy
# finish rather than cancelling it mid-migration.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Apply migrations & deploy to Vercel
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required secrets
        shell: bash
        run: |
          missing=""
          [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]  && missing="$missing SUPABASE_ACCESS_TOKEN"
          [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]   && missing="$missing SUPABASE_DB_PASSWORD"
          [ -z "${{ secrets.VERCEL_TOKEN }}" ]           && missing="$missing VERCEL_TOKEN"
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ]          && missing="$missing VERCEL_ORG_ID"
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]      && missing="$missing VERCEL_PROJECT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Add them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.108.0

      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref bvccuypipogprmjxctxp
          supabase db push --include-all --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is read from packageManager field in package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        run: pnpm vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: pnpm vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          DEPLOY_URL=$(pnpm vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "::notice title=Deployed to Vercel::$DEPLOY_URL"

      - name: Job summary
        if: always()
        run: |
          echo "## ✅ Migrations applied & deployed to Vercel" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
