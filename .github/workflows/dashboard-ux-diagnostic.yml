name: Dashboard UX diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-diagnostic:
    if: github.head_ref == 'fix/dashboard-design-ux'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Capture unit output
        run: |
          set +e
          pnpm test:coverage > unit-output.txt 2>&1
          code=$?
          echo "$code" > unit-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-ux-unit-output
          path: |
            unit-output.txt
            unit-exit-code.txt
